<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte Cienty</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    .phone {
      width: 390px; height: 844px;
      background: white; border-radius: 44px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.18);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .status-bar { background: #c026d3; height: 44px; display: flex; align-items: center; justify-content: center; }
    .status-bar span { color: white; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }

    .header {
      background: #c026d3; padding: 12px 20px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(192,38,211,0.3);
    }
    .back { color: white; font-size: 20px; opacity: 0.8; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-info h3 { color: white; font-size: 15px; font-weight: 700; }
    .header-info p { color: rgba(255,255,255,0.8); font-size: 12px; }
    .header-actions { margin-left: auto; display: flex; gap: 16px; }
    .header-actions span { color: white; font-size: 18px; opacity: 0.9; }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #f0f0f0; }

    .message { max-width: 78%; }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .message.bot  .msg-bubble { background: white; border-bottom-left-radius: 4px; color: #1a1a1a; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .message.user .msg-bubble { background: #c026d3; color: white; border-bottom-right-radius: 4px; }

    .msg-time { font-size: 11px; color: #aaa; margin-top: 3px; padding: 0 2px; }
    .message.user .msg-time { text-align: right; color: rgba(192,38,211,0.6); }

    .typing-area { background: #f0f0f0; padding: 4px 16px 8px; }
    .typing-bubble { background: white; border-radius: 18px; border-bottom-left-radius: 4px; padding: 10px 16px; display: none; width: fit-content; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .typing-bubble span { display: inline-block; width: 7px; height: 7px; background: #c026d3; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
    .typing-bubble span:nth-child(2){animation-delay:.2s} .typing-bubble span:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .suggestions { padding: 8px 16px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; background: #f9f9f9; border-top: 1px solid #eee; }
    .suggestions::-webkit-scrollbar { display: none; }
    .suggestion { white-space: nowrap; padding: 7px 14px; background: #f9e6fc; border: 1px solid #e8c0f5; border-radius: 20px; font-size: 12px; color: #c026d3; cursor: pointer; font-weight: 500; }

    .input-area { padding: 10px 12px; background: #f9f9f9; display: flex; gap: 8px; align-items: center; border-top: 1px solid #eee; }
    .input-wrap { flex: 1; background: white; border-radius: 24px; display: flex; align-items: center; padding: 0 14px; border: 1px solid #e5e5e5; }
    .input-wrap input { flex: 1; border: none; outline: none; font-size: 14px; padding: 10px 0; background: transparent; }
    .emoji-btn { font-size: 18px; cursor: pointer; }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #c026d3; color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { background: #ddd; }

    .home-bar { height: 34px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
    .home-bar div { width: 130px; height: 5px; background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span></div>

    <div class="header">
      <div class="back">‹</div>
      <div class="avatar">👩‍💼</div>
      <div class="header-info">
        <h3>Carla · Cienty</h3>
        <p>🟢 online agora</p>
      </div>
      <div class="header-actions">
        <span>📞</span>
        <span>⋮</span>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="msg-bubble">Olá! Sou a Carla, assistente de suporte da Cienty 👋<br><br>Posso verificar pedidos, resolver erros de distribuidoras e tirar suas dúvidas. Como posso te ajudar?</div>
        <div class="msg-time">agora</div>
      </div>
    </div>

    <div class="typing-area">
      <div class="typing-bubble" id="typing"><span></span><span></span><span></span></div>
    </div>

    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion(this)">Minha Servimed tá com erro</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Pedido travado</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Preço diferente</div>
      <div class="suggestion" onclick="sendSuggestion(this)">Distribuidora sumiu</div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <span class="emoji-btn">😊</span>
        <input type="text" id="input" placeholder="Mensagem" onkeydown="handleKey(event)" />
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <div class="home-bar"><div></div></div>
  </div>

  <script>
    const sessionId = 'client_' + Date.now();
    function getTime() { return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
    function addMessage(text, type) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${getTime()}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
    function setTyping(show) {
      document.getElementById('typing').style.display = show ? 'block' : 'none';
      document.getElementById('sendBtn').disabled = show;
      document.getElementById('messages').scrollTop = 999999;
    }
    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage(text, 'user');
      setTyping(true);
      try {
        const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({session_id: sessionId, message: text}) });
        const data = await res.json();
        setTyping(false);
        addMessage(data.reply || 'Erro.', 'bot');
      } catch { setTyping(false); addMessage('Erro de conexão.', 'bot'); }
    }
    function sendSuggestion(el) { document.getElementById('input').value = el.textContent; sendMessage(); }
    function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
  </script>
</body>
</html>
